name: Deploy Tenant Front (Staging)

on:
  push:
    branches:
      - main
      - feat/tenant-design-migration
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: false
        default: feat/tenant-design-migration

concurrency:
  group: deploy-front-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deploy branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.branch }}" ]; then
            echo "name=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -e
            bash /opt/dressnmore/deploy/deploy-front.sh "${{ steps.branch.outputs.name }}"
